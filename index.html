<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Simulator</title>
    
    <meta name="description" content="Futuristic AI Interview Simulator offering real-time AI-generated questions and robust evaluations with a cyberpunk 3D UI.">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Titillium+Web:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <!-- Three.js Pipeline -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <!-- Persistent 3D Background Canvas -->
    <canvas id="bg-canvas"></canvas>

    <!-- Navigation Bar -->
    <nav class="top-nav glass-panel" style="border-radius: 0; border-top: none; border-left: none; border-right: none; padding: 1rem 3rem;">
        <div class="nav-brand heading-font neon-text interactable" data-target="landing" style="font-size:1.5rem">
            <i class="fa-solid fa-microchip"></i> AI_SIMULATOR
        </div>
        <ul class="nav-menu">
            <li><a class="nav-link interactable" data-target="landing">Home</a></li>
            <li><a class="nav-link interactable" data-target="history">History</a></li>
            <li><a class="nav-link interactable" data-target="login">Login</a></li>
        </ul>
    </nav>

    <!-- Custom Cursor -->
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-outline" id="cursor-outline"></div>

    <!-- Main UI Container for Pages -->
    <main id="app-container">
        <!-- Dynamic Content Container natively loads all chunks including Login and Landing -->
        <section id="dynamic-content" class="view-section"></section>
    </main>

    <!-- Global Loading Overlay -->
    <div id="loading-screen" class="hidden">
        <div class="loader-spinner"></div>
        <p class="heading-font neon-text glitch-text" data-text="Initializing AI Core...">Initializing AI Core...</p>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/voice.js"></script>
    <script src="js/threeScene.js"></script>
    <script src="js/interview.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
